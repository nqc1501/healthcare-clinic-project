<div mat-dialog-title>
    <h1>{{ data ? 'Sửa thông tin' : 'Thêm mới ca làm việc' }}</h1>
</div>
<div>
    <form [formGroup]="shiftForm" (ngSubmit)="onFormSubmit()">
        <div mat-dialog-content>
            <div class="row">
                <mat-form-field appearance="outline">
                    <mat-label> Tên Ca Làm </mat-label>
                    <input matInput type="text" formControlName="name">
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label> Ngày Làm Việc </mat-label>
                    <input matInput type="text" formControlName="date">
                </mat-form-field>
            </div>

            <div class="row">
                <mat-form-field appearance="outline">
                    <mat-label> Thời gian bắt đầu </mat-label>
                    <input matInput type="text" formControlName="startTime">
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label> Thời gian kết thúc </mat-label>
                    <input matInput type="text" formControlName="endTime">
                </mat-form-field>
            </div>

            <div class="row">
                <mat-form-field appearance="outline">
                    <mat-label> Số lượng đặt trực tuyến </mat-label>
                    <input matInput type="text" formControlName="quantityBookOn">
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label> Số lượng đã đặt </mat-label>
                    <input matInput type="text" formControlName="quantityBooked">
                </mat-form-field>
            </div>
        </div>

        <div mat-dialog-actions class="action">
            <button mat-raised-button type="button" [mat-dialog-close]="false" color="accent"> Hủy </button>
            <button mat-raised-button color="primary" type="submit"> Lưu </button>
        </div>
    </form>
</div>
